<html>
<head>
	<title>CDAC Mumbai Student Registration</title>

    <link rel="stylesheet" href="studentregistrationform.css">
    
</head>
<body>

    <h1>CDAC Mumbai</h1>
    <p class="subtitle">Student Registration Form</p>
    
<form>

    <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
    </div>

    <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
    </div>
    
	<div class="form-group">
    <label>Date of Birth</label>

    <select name="day" required>
        <option value="">Day</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>11</option>
        <option>12</option>
        <option>13</option>
        <option>14</option>
        <option>15</option>
        <option>16</option>
        <option>17</option>
        <option>18</option>
        <option>19</option>
        <option>20</option>
        <option>21</option>
        <option>22</option>
        <option>23</option>
        <option>24</option>
        <option>25</option>
        <option>26</option>
        <option>27</option>
        <option>28</option>
        <option>29</option>
        <option>30</option>
        <option>31</option>
    </select>

    <select name="month" required>
        <option value="">Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>

    <select name="year" required>
        <option value="">Year</option>
        <option>1990</option>
        <option>1991</option>
        <option>1992</option>
        <option>1993</option>
        <option>1994</option>
        <option>1995</option>
        <option>1996</option>
        <option>1997</option>
        <option>1998</option>
        <option>1999</option>
        <option>2000</option>
        <option>2001</option>
        <option>2002</option>
        <option>2003</option>
        <option>2004</option>
        <option>2005</option>
    </select>
	</div>
	
	<div class="form-group">
    <label for="email">Email ID</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
	</div>

	<div class="form-group">
    <label for="mobile">Mobile Number</label>
    <input type="tel" id="mobile" name="mobile" placeholder="Enter 10-digit mobile number"
           pattern="[0-9]{10}" maxlength="10" required>
	</div>
	
	<div class="form-group">
    <label>Gender</label>

    <div class="radio-group">
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Other</label>
    </div>
	</div>
	
	<div class="form-group">
    <label for="address">Address</label>
    <textarea id="address" name="address" rows="3" placeholder="Enter your address" required></textarea>
	</div>

	<div class="form-group">
    <label for="city">City</label>
    <input type="text" id="city" name="city" placeholder="Enter city" required>
	</div>

	<div class="form-group">
    <label for="pincode">Pincode</label>
    <input type="text" id="pincode" name="pincode" placeholder="Enter 6-digit pincode"
           pattern="[0-9]{6}" maxlength="6" required>
	</div>

	<div class="form-group">
    <label for="state">State</label>
    <input type="text" id="state" name="state" placeholder="Enter state" required>
	</div>

	<div class="form-group">
    <label for="country">Country</label>
    <input type="text" id="country" name="country" placeholder="Enter country" required>
	</div>

	<h2 class="section-title">Qualification</h2>

	<table class="qualification-table">
    <tr>
        <th class="col-small">No.</th>
        <th class="col-medium">Examination</th>
        <th>Board</th>
        <th>Percentage</th>
        <th>Year of Passing</th>
    </tr>

    <tr>
        <td class="col-small">1</td>
        <td class="col-medium exam-name">Class X</td>
        <td><input type="text"></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number"></td>
    </tr>

    <tr>
        <td class="col-small">2</td>
        <td class="col-medium exam-name">Class XII</td>
        <td><input type="text"></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number"></td>
    </tr>

    <tr>
        <td class="col-small">3</td>
        <td class="col-medium exam-name">Graduation</td>
        <td><input type="text"></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number"></td>
    </tr>

    <tr>
        <td class="col-small">4</td>
        <td class="col-medium exam-name">Masters</td>
        <td><input type="text"></td>
        <td><input type="number" step="0.01"></td>
        <td><input type="number"></td>
    </tr>
</table>

	<div class="form-group">
    <label>Certification Applied For</label>

    <div class="radio-group">
        <label class="radio-option">
            <input type="radio" name="course" value="PCCP-AC" required>
            PCCP-AC
        </label>

        <label class="radio-option">
            <input type="radio" name="course" value="PGCP-AI">
            PGCP-AI
        </label>

        <label class="radio-option">
            <input type="radio" name="course" value="PGCP-BDA">
            PGCP-BDA
        </label>
    </div>
	</div>

</form>

</body>
</html>
